<!DOCTYPE html>
<html>
<head>
    <title>Qubit Simulator</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            overflow: hidden;
        }

        h1 {
            margin-top: 20px;
        }

        .container {
            margin-top: 40px;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            width: 300px;
            margin: auto;
            backdrop-filter: blur(10px);
        }

        input[type="range"] {
            width: 100%;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #00c6ff;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #00eaff;
        }

        #output {
            margin-top: 15px;
        }

        /* Fake 3D Qubit Sphere */
        .sphere {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #00c6ff, #004e92);
            margin: 30px auto;
            animation: spin 6s linear infinite;
            box-shadow: 0 0 30px #00c6ff;
        }

        @keyframes spin {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        /* Background stars */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background: transparent;
            box-shadow:
                100px 200px white,
                300px 400px white,
                500px 100px white,
                700px 300px white,
                900px 200px white;
            animation: moveStars 20s linear infinite;
        }

        @keyframes moveStars {
            from { transform: translateY(0); }
            to { transform: translateY(-1000px); }
        }
    </style>
</head>

<body>

<div class="stars"></div>

<h1>⚛️ Qubit Simulator</h1>

<div class="sphere"></div>

<div class="container">
    <div class="card">
        <label>Probability of 0: <span id="probValue">0.7</span></label>
        <input type="range" id="prob" min="0" max="1" step="0.01" value="0.7">

        <button onclick="run()">Run 100 Trials</button>

        <div id="output"></div>
    </div>
</div>

<script>
    const slider = document.getElementById("prob");
    const probText = document.getElementById("probValue");

    slider.oninput = function() {
        probText.innerText = this.value;
    }

    function measureQubit(prob0) {
        let r = Math.random();
        return r <= prob0 ? 0 : 1;
    }

    function run() {
        let prob0 = parseFloat(slider.value);
        let count0 = 0;
        let count1 = 0;

        for (let i = 0; i < 100; i++) {
            let result = measureQubit(prob0);
            if (result === 0) count0++;
            else count1++;
        }

        document.getElementById("output").innerHTML =
            `0s: ${count0} <br>
             1s: ${count1} <br>
             %0: ${(count0/100*100).toFixed(2)}% <br>
             %1: ${(count1/100*100).toFixed(2)}%`;
    }
</script>

</body>
</html>
